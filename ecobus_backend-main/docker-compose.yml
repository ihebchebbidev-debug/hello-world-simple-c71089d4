version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecobus
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecobus
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: "*"
      AUTO_MIGRATE: "true"
      # Enable + configure to keep the container in sync with a GitHub branch
      GIT_SYNC_ENABLED: "false"
      GIT_SYNC_REPO: ""
      GIT_SYNC_BRANCH: "main"
      GIT_SYNC_DIR: "/app/repo"
      GIT_SYNC_INTERVAL_MS: "60000"
    ports: ["4000:4000"]
    # Migrations + seed are now run by the Node process itself.
    command: ["node", "src/server.js"]

volumes:
  pgdata:
